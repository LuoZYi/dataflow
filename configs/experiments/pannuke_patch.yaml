# @package _global_
defaults:
  - _self_

# ======================================================================
# 路径配置：你需要改成自己的实际路径
# ======================================================================
paths:
  pannuke_root: /home/path_sam3/pipeline/data_links/PanNuke
  # 我们刚刚用 glas_to_coco.py 生成的 COCO 标注目录
  pannuke_coco_root: /home/path_sam3/dataflow/generated_coco/pannuke
  # 实验 log + checkpoint 目录（随便给一个你有写权限的位置）
  experiment_log_dir: /home/path_sam3/dataflow/runs/pannuke/pannuke_patch
  # sam3 提供的 bpe vocab 路径
  bpe_path: /home/path_sam3/sam3/sam3/assets/bpe_simple_vocab_16e6.txt.gz



# ======================================================================
# CoNSeP 专用的 transforms + loss
# 基本直接抄 roboflow，只是改名字
# ======================================================================
pannuke:
  # --------------------- 训练时的图像 & query transforms ---------------------
  # train_transforms:
  #   - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
  #     transforms:
  #       - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
  #         query_filter:
  #           _target_: sam3.train.transforms.filter_query_transforms.FilterCrowds
  #       - _target_: sam3.train.transforms.point_sampling.RandomizeInputBbox
  #         box_noise_std: 0.1
  #         box_noise_max: 20
  #       - _target_: sam3.train.transforms.segmentation.DecodeRle

  #       - _target_: sam3.train.transforms.mpp_rescale.FixedMPPRescale
  #         target_mpp: 0.5
  #         max_hw: 2048

  #       - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
  #         sizes:
  #           _target_: sam3.train.transforms.basic.get_random_resize_scales
  #           size: ${scratch.resolution}
  #           min_size: 480
  #           rounded: false
  #         max_size:
  #           _target_: sam3.train.transforms.basic.get_random_resize_max_size
  #           size: ${scratch.resolution}
  #         square: true
  #         consistent_transform: ${scratch.consistent_transform}
  #       - _target_: sam3.train.transforms.basic_for_api.PadToSizeAPI
  #         size: ${scratch.resolution}
  #         consistent_transform: ${scratch.consistent_transform}
  #       - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI
  #       - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
  #         query_filter:
  #           _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets
  #       - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
  #         mean: ${scratch.train_norm_mean}
  #         std: ${scratch.train_norm_std}
  #       - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
  #         query_filter:
  #           _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets
  #       - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
  #         query_filter:
  #           _target_: sam3.train.transforms.filter_query_transforms.FilterFindQueriesWithTooManyOut
  #           max_num_objects: ${scratch.max_ann_per_img}

  train_transforms:
    - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
      transforms:
        # 1) query-level filters / prompts
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterCrowds
        - _target_: sam3.train.transforms.point_sampling.RandomizeInputBbox
          box_noise_std: 0.1
          box_noise_max: 20

        # 2) decode masks early (needed for later size ops)
        - _target_: sam3.train.transforms.segmentation.DecodeRle

        # 3) IMPORTANT: cap objects early to avoid OOM / "no find queries"
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterFindQueriesWithTooManyOut
            max_num_objects: ${scratch.max_ann_per_img}

        # # 4) unify physical scale (optional but you want it)
        # - _target_: sam3.train.transforms.mpp_rescale.FixedMPPRescale
        #   target_mpp: 0.5
        #   max_hw: 2048

        # 5) resize/pad to model resolution
        - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
          sizes:
            _target_: sam3.train.transforms.basic.get_random_resize_scales
            size: ${scratch.resolution}
            min_size: 480
            rounded: false
          max_size:
            _target_: sam3.train.transforms.basic.get_random_resize_max_size
            size: ${scratch.resolution}
          square: true
          consistent_transform: ${scratch.consistent_transform}

        - _target_: sam3.train.transforms.basic_for_api.PadToSizeAPI
          size: ${scratch.resolution}
          consistent_transform: ${scratch.consistent_transform}

        - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI

        # 6) drop empty after all geometry ops
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets

        - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
          mean: ${scratch.train_norm_mean}
          std: ${scratch.train_norm_std}

  # --------------------- 验证时 transforms（简单点） ---------------------
  val_transforms:
    - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
      transforms:
        - _target_: sam3.train.transforms.segmentation.DecodeRle

        # - _target_: sam3.train.transforms.mpp_rescale.FixedMPPRescale
        #   target_mpp: 0.5
        #   max_hw: 2048


        - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
          sizes: ${scratch.resolution}
          max_size:
            _target_: sam3.train.transforms.basic.get_random_resize_max_size
            size: ${scratch.resolution}
          square: true
          consistent_transform: False
        - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI
        - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
          mean: ${scratch.train_norm_mean}
          std: ${scratch.train_norm_std}

  # --------------------- loss（和 Roboflow 的一样，只用 bbox） ---------------------
  # loss:
  #   _target_: sam3.train.loss.sam3_loss.Sam3LossWrapper
  #   matcher: ${scratch.matcher}
  #   o2m_weight: 2.0
  #   o2m_matcher:
  #     _target_: sam3.train.matcher.BinaryOneToManyMatcher
  #     alpha: 0.3
  #     threshold: 0.4
  #     topk: 4
  #   use_o2m_matcher_on_o2m_aux: false
  #   loss_fns_find:
  #     - _target_: sam3.train.loss.loss_fns.Boxes
  #       weight_dict:
  #         loss_bbox: 5.0
  #         loss_giou: 2.0
  #     - _target_: sam3.train.loss.loss_fns.IABCEMdetr
  #       weak_loss: False
  #       weight_dict:
  #         loss_ce: 20.0
  #         presence_loss: 20.0
  #       pos_weight: 2.0
  #       alpha: 0.25
  #       gamma: 2
  #       use_presence: True
  #       pos_focal: False
  #       pad_n_queries: 200
  #       pad_scale_pos: 1.0

  #   loss_fn_semantic_seg: null
  #   scale_by_find_batch_size: ${scratch.scale_by_find_batch_size}
    
  # NOTE: Loss to be used for training in case of segmentation
  loss:
    _target_: sam3.train.loss.sam3_loss.Sam3LossWrapper
    matcher: ${scratch.matcher}
    o2m_weight: 0.0 # 2.0 
    o2m_matcher:
      _target_: sam3.train.matcher.BinaryOneToManyMatcher
      alpha: 0.3
      threshold: 0.4
      topk: 4
    use_o2m_matcher_on_o2m_aux: false
    loss_fns_find:
      - _target_: sam3.train.loss.loss_fns.Boxes
        weight_dict:
          loss_bbox: 5.0
          loss_giou: 2.0
      - _target_: sam3.train.loss.loss_fns.IABCEMdetr
        weak_loss: False
        weight_dict:
          loss_ce: 20.0 # Another option is 100.0
          presence_loss: 20.0
        pos_weight: 5.0 # Another option is 5.0
        alpha: 0.25
        gamma: 2
        use_presence: True  # Change
        pos_focal: false
        pad_n_queries: 200
        pad_scale_pos: 1.0
      - _target_: sam3.train.loss.loss_fns.Masks
        focal_alpha: 0.25
        focal_gamma: 2.0
        weight_dict:
          loss_mask: 200.0
          loss_dice: 10.0
        compute_aux: false
    loss_fn_semantic_seg:
      _target_: sam3.train.loss.loss_fns.SemanticSegCriterion
      presence_head: True
      presence_loss: False  # Change
      focal: True
      focal_alpha: 0.6
      focal_gamma: 2.0
      downsample: False
      weight_dict:
        loss_semantic_seg: 20.0
        loss_semantic_presence: 1.0
        loss_semantic_dice: 30.0
    scale_by_find_batch_size: ${scratch.scale_by_find_batch_size}

# ======================================================================
# 通用 scratch 区（参数 / lr / collate_fn 等）
# ======================================================================
scratch:
  enable_segmentation: True        
  d_model: 256
  pos_embed:
    _target_: sam3.model.position_encoding.PositionEmbeddingSine
    num_pos_feats: ${scratch.d_model}
    normalize: true
    scale: null
    temperature: 10000

  # Box 后处理（主要给评估用，训练时用不到）
  use_presence_eval: False #True
  # original_box_postprocessor:
  #   _target_: sam3.eval.postprocessors.PostProcessImage
  #   max_dets_per_img: -1
  #   use_original_ids: true
  #   use_original_sizes_box: true
  #   use_presence: ${scratch.use_presence_eval}
  original_mask_postprocessor:
    _target_: sam3.eval.postprocessors.PostProcessImage
    iou_type: "segm"
    max_dets_per_img: 300 #100
    use_original_ids: true
    use_original_sizes_box: true      # box 也会一起产出（无所谓）
    use_original_sizes_mask: true     # ✅ mask 一定要用 original size
    convert_mask_to_rle: true         # ✅ COCO segm eval 通常需要 RLE
    always_interpolate_masks_on_gpu: true
    use_presence: ${scratch.use_presence_eval}
    detection_threshold: 0.5 #-1.0

  # Hungarian matcher
  matcher:
    _target_: sam3.train.matcher.BinaryHungarianMatcherV2
    focal: true
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    alpha: 0.25
    gamma: 1.0
    stable: False
  scale_by_find_batch_size: True

  # 图像 & batch 相关
  resolution: 1008
  consistent_transform: False
  max_ann_per_img: 200
  train_norm_mean: [0.5, 0.5, 0.5]
  train_norm_std: [0.5, 0.5, 0.5]
  val_norm_mean: [0.5, 0.5, 0.5]
  val_norm_std: [0.5, 0.5, 0.5]

  num_train_workers: 4
  num_val_workers: 2
  max_data_epochs: 30
  target_epoch_size: 1500
  hybrid_repeats: 1
  context_length: 2
  gather_pred_via_filesys: false

  # lr & scheduler
  lr_scale: 0.05
  lr_transformer: ${times:5e-4,${scratch.lr_scale}}
  lr_vision_backbone: 0.0 #${times:2.5e-4,${scratch.lr_scale}}
  lr_language_backbone: 0.0 #${times:5e-5,${scratch.lr_scale}}
  lrd_vision_backbone: 0.9
  wd: 0.05
  scheduler_timescale: 100
  scheduler_warmup: 50
  scheduler_cooldown: 50

  # batch & collate
  val_batch_size: 1
  collate_fn_val:
    _target_: sam3.train.data.collator.collate_fn_api
    _partial_: true
    repeats: ${scratch.hybrid_repeats}
    dict_key: pannuke          
    with_seg_masks: ${scratch.enable_segmentation}

  gradient_accumulation_steps: 1
  train_batch_size: 1
  collate_fn:
    _target_: sam3.train.data.collator.collate_fn_api
    _partial_: true
    repeats: ${scratch.hybrid_repeats}
    dict_key: all                # ⚠️ train 的 dict_key = "all"
    with_seg_masks: ${scratch.enable_segmentation}

# ======================================================================
# Trainer 配置
# ======================================================================
trainer:
  _target_: sam3.train.trainer.Trainer
  skip_saving_ckpts: False
  empty_gpu_mem_cache_after_eval: True
  skip_first_val: True
  max_epochs: ${scratch.max_data_epochs}
  accelerator: cuda
  seed_value: 123
  val_epoch_freq: 2
  mode: train
  gradient_accumulation_steps: ${scratch.gradient_accumulation_steps}

  distributed:
    backend: nccl
    find_unused_parameters: True
    gradient_as_bucket_view: True

  loss:
    # train 用 key="all" -> 用真正的 CoNSeP loss
    all: ${pannuke.loss}
    # val 用 key="consep" -> fallback 到 default（DummyLoss，不算真的 loss）
    default: #${consep.loss}
      _target_: sam3.train.loss.sam3_loss.DummyLoss

  data:
    train:
      _target_: sam3.train.data.torch_dataset.TorchDataset
      dataset:
        _target_: sam3.train.data.sam3_image_dataset.Sam3ImageDataset 
        # _target_: sam3.train.data.sam3_pathology_dataset.Sam3PathologyDataset
        transforms: ${pannuke.train_transforms}
        load_segmentation: ${scratch.enable_segmentation}
        max_ann_per_img: 500000
        multiplier: 1
        max_train_queries: 50000
        max_val_queries: 50000
        training: true
        use_caching: False
        # img_folder: ${paths.consep_root}
        # ann_file: ${paths.consep_coco_root}/consep_train_instance.coco.json
        img_folder: ${paths.pannuke_root}/pannuke_patches_train/images
        ann_file:  ${paths.pannuke_coco_root}/pannuke_patches_train/annotations/instances_patch.json
        

      shuffle: True
      batch_size: ${scratch.train_batch_size}
      num_workers: ${scratch.num_train_workers}
      pin_memory: True
      drop_last: True
      collate_fn: ${scratch.collate_fn}

    val:
      _target_: sam3.train.data.torch_dataset.TorchDataset
      dataset:
        _target_: sam3.train.data.sam3_image_dataset.Sam3ImageDataset
        # _target_: sam3.train.data.sam3_pathology_dataset.Sam3PathologyDataset
        load_segmentation: ${scratch.enable_segmentation}
        coco_json_loader:
          _target_: sam3.train.data.coco_json_loaders.COCO_FROM_JSON
          include_negatives: False
          category_chunk_size: 9999
          _partial_: true
        img_folder: ${paths.pannuke_root}/pannuke_patches_val/images
        ann_file: ${paths.pannuke_coco_root}/pannuke_patches_val/annotations/instances_patch.json
        transforms: ${pannuke.val_transforms}
        max_ann_per_img: 100000
        multiplier: 1
        training: false

      shuffle: False
      batch_size: ${scratch.val_batch_size}
      num_workers: ${scratch.num_val_workers}
      pin_memory: True
      drop_last: False
      collate_fn: ${scratch.collate_fn_val}

  # model:
  #   _target_: sam3.model_builder.build_sam3_image_model
  #   bpe_path: ${paths.bpe_path}
  #   device: cpus
  #   eval_mode: false
  #   enable_segmentation: ${scratch.enable_segmentation}
  model:
    _target_: sam3.model_builder.build_sam3_image_model
    bpe_path: ${paths.bpe_path}

    # 关键两行：不用 HF，直接读本地
    load_from_HF: false
    checkpoint_path: /home/path_sam3/.hf/hub/models--facebook--sam3/snapshots/3c879f39826c281e95690f02c7821c4de09afae7/sam3.pt  # ←换成你的实际路径

    # 其他保持你训练需要的
    device: cuda
    eval_mode: false
    enable_segmentation: ${scratch.enable_segmentation}
    enable_inst_interactivity: false
    compile: false

  # 先不搞 metric，单纯跑通训练
   
  # meters:
  #   val:
  #     glas:
  #       detection:
  #         _target_: sam3.eval.coco_writer.PredictionDumper
  #         iou_type: "bbox"  # 根据需要修改为 "segmentation" 如果是语义分割任务
  #         dump_dir: ${launcher.experiment_log_dir}/dumps/glas
  #         merge_predictions: True
  #         postprocessor: ${scratch.original_box_postprocessor}
  #         gather_pred_via_filesys: ${scratch.gather_pred_via_filesys}
  #         maxdets: 100  # 您可以根据实际需求调整
  #         pred_file_evaluators:
  #           - _target_: sam3.eval.coco_eval_offline.CocoEvaluatorOfflineWithPredFileEvaluators
  #             gt_path: ${paths.glas_coco_root}/val_glas.coco.json  # 修改为 GlaS 测试集的标注文件路径
  #             tide: False
  #             iou_type: "bbox"  # 继续使用 bbox，如果是语义分割任务，可以改为 "segmentation"

  meters:
    val:
      pannuke:
        segm:
          _target_: sam3.eval.coco_writer.PredictionDumper
          iou_type: "segm"
          dump_dir: ${launcher.experiment_log_dir}/dumps/pannuke
          merge_predictions: True
          postprocessor: ${scratch.original_mask_postprocessor}
          gather_pred_via_filesys: ${scratch.gather_pred_via_filesys}
          maxdets: 300
          pred_file_evaluators:
            - _target_: sam3.eval.coco_eval_offline.CocoEvaluatorOfflineWithPredFileEvaluators
              gt_path: ${paths.pannuke_coco_root}/pannuke_patches_train/annotations/instances_patch.json
              tide: False
              iou_type: "segm"



  optim:
    amp:
      enabled: True
      amp_dtype: bfloat16

    optimizer:
      _target_: torch.optim.AdamW

    gradient_clip:
      _target_: sam3.train.optim.optimizer.GradientClipper
      max_norm: 0.1
      norm_type: 2

    param_group_modifiers:
      - _target_: sam3.train.optim.optimizer.layer_decay_param_modifier
        _partial_: True
        layer_decay_value: ${scratch.lrd_vision_backbone}
        apply_to: 'backbone.vision_backbone.trunk'
        overrides:
          - pattern: '*pos_embed*'
            value: 1.0

    options:
      lr:
        - scheduler:
            _target_: sam3.train.optim.schedulers.InverseSquareRootParamScheduler
            base_lr: ${scratch.lr_transformer}
            timescale: ${scratch.scheduler_timescale}
            warmup_steps: ${scratch.scheduler_warmup}
            cooldown_steps: ${scratch.scheduler_cooldown}
        - scheduler:
            _target_: sam3.train.optim.schedulers.InverseSquareRootParamScheduler
            base_lr: ${scratch.lr_vision_backbone}
            timescale: ${scratch.scheduler_timescale}
            warmup_steps: ${scratch.scheduler_warmup}
            cooldown_steps: ${scratch.scheduler_cooldown}
          param_names:
            - 'backbone.vision_backbone.*'
        - scheduler:
            _target_: sam3.train.optim.schedulers.InverseSquareRootParamScheduler
            base_lr: ${scratch.lr_language_backbone}
            timescale: ${scratch.scheduler_timescale}
            warmup_steps: ${scratch.scheduler_warmup}
            cooldown_steps: ${scratch.scheduler_cooldown}
          param_names:
            - 'backbone.language_backbone.*'

      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: ${scratch.wd}
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.0
          param_names:
            - '*bias*'
          module_cls_names: ['torch.nn.LayerNorm']

  checkpoint:
    save_dir: ${launcher.experiment_log_dir}/checkpoints
    save_freq: 0

  logging:
    tensorboard_writer:
      _target_: sam3.train.utils.logger.make_tensorboard_logger
      log_dir: ${launcher.experiment_log_dir}/tensorboard
      flush_secs: 120
      should_log: True
    wandb_writer: null
    log_dir: ${launcher.experiment_log_dir}/logs
    log_freq: 10

# ======================================================================
# Launcher / Submitit
# ======================================================================
launcher:
  num_nodes: 1
  gpus_per_node: 1
  experiment_log_dir: ${paths.experiment_log_dir}
  multiprocessing_context: forkserver

submitit:
  account: null
  partition: null
  qos: null
  timeout_hour: 72
  use_cluster: False        # 先本地跑通；你要上 slurm 再改成 True
  cpus_per_task: 8
  port_range: [10000, 65000]
  constraint: null